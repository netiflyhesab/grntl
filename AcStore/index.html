// ============================================================
// DEPOSIT MODAL — Balans artırma
// ============================================================
function DepositModal({ user, onClose, showToast }) {
  const [amount, setAmount] = React.useState('');
  const [promoCode, setPromoCode] = React.useState('');
  const [promoInfo, setPromoInfo] = React.useState(null); // {discount, isFree, code}
  const [checkImg, setCheckImg] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [step, setStep] = React.useState('form'); // form | done
  const [reqId, setReqId] = React.useState('');
  const fileRef = React.useRef(null);

  const presets = [1, 2, 5, 10];

  const finalAmount = React.useMemo(() => {
    const base = parseFloat(amount) || 0;
    if (!promoInfo || base === 0) return base;
    if (promoInfo.isFree) return 0;
    return Math.max(0, +(base * (1 - promoInfo.discount / 100)).toFixed(2));
  }, [amount, promoInfo]);

  const checkPromo = async () => {
    if (!promoCode.trim()) return;
    try {
      const doc = await db.collection('promoCodes').doc(promoCode.trim().toUpperCase()).get();
      if (!doc.exists) { showToast('Promo kod tapılmadı', 'error'); return; }
      const d = doc.data();
      if (d.status !== 'active') { showToast('Bu kod artıq istifadə edilib və ya deaktivdir', 'error'); return; }
      if (d.usedCount >= (d.maxUse || 999999)) { showToast('Kodun istifadə limiti dolub', 'error'); return; }
      setPromoInfo({ discount: d.discount || 0, isFree: d.isFree || false, code: promoCode.trim().toUpperCase(), docData: d });
      if (d.isFree) showToast('🎉 Tam pulsuz! Ödəniş tələb olunmur.', 'success');
      else showToast(`✅ ${d.discount}% endirim tətbiq edildi!`, 'success');
    } catch(e) { showToast('Xəta: ' + e.message, 'error'); }
  };

  const handleImg = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setCheckImg(ev.target.result);
    reader.readAsDataURL(file);
  };

  const handleSubmit = async () => {
    const base = parseFloat(amount);
    if (!base || base < 1) { showToast('Minimum 1 ₼ daxil edin', 'error'); return; }
    if (!promoInfo?.isFree && !(promoInfo?.docData?.amount > 0) && !checkImg) { showToast('Ödəniş çekini yükləyin', 'error'); return; }
    setLoading(true);
    try {
      const id = 'DEP' + Date.now().toString(36).toUpperCase();
      setReqId(id);

      await db.collection('depositRequests').doc(id).set({
        uid: user.uid,
        email: user.email,
        displayName: user.displayName || '',
        reqId: id,
        baseAmount: base,
        finalAmount,
        promoCode: promoInfo?.code || null,
        promoDiscount: promoInfo?.discount || 0,
        isFree: promoInfo?.isFree || false,
        status: 'pending',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });

      // Promo kod istifadə sayını artır
      if (promoInfo?.code) {
        await db.collection('promoCodes').doc(promoInfo.code).update({
          usedCount: firebase.firestore.FieldValue.increment(1)
        });
      }

      // Telegram bildirişi
      const caption =
        `💰 <b>Balans Sorğusu — AccStore</b>\n\n` +
        `👤 <b>${user.displayName || 'İstifadəçi'}</b>\n` +
        `📧 ${user.email}\n` +
        `🆔 Sorğu: <code>${id}</code>\n` +
        `💵 Məbləğ: ${base} ₼` +
        (promoInfo ? `\n🎟 Promo: <b>${promoInfo.code}</b> (${promoInfo.isFree ? 'TAM PULSUZ' : promoInfo.discount + '% endirim'})\n✅ Ödənilməli: ${finalAmount} ₼` : '') +
        `\n\n📋 Firestore-da bu sorğunu <b>approved</b> edin → balans avtomatik artacaq.`;

      if (promoInfo?.isFree || promoInfo?.docData?.amount > 0) {
        await tgNotify(caption);
        // Tam pulsuz və ya amount varsa dərhal approve et
        await db.collection('depositRequests').doc(id).update({ status: 'approved' });
        const creditAmount = promoInfo?.docData?.amount > 0 ? promoInfo.docData.amount : base;
        await db.collection('users').doc(user.uid).set(
          { balance: firebase.firestore.FieldValue.increment(creditAmount) }, { merge: true }
        );
        await db.collection('transactions').add({
          uid: user.uid, type: 'promo_topup', amount: creditAmount,
          description: `Promokod: ${promoInfo.code}`,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        showToast(`🎉 ${creditAmount} ₼ balansınıza əlavə edildi!`, 'success');
      } else {
        await tgSendPhoto(checkImg, caption);
        showToast('Sorğu göndərildi! Admin yoxlayıb balansı artıracaq.', 'success');
      }

      setStep('done');
    } catch(e) { showToast('Xəta: ' + e.message, 'error'); }
    setLoading(false);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div style={{fontFamily:'Rajdhani',fontSize:20,fontWeight:700}}>💰 Balans Artır</div>
          <button className="btn btn-ghost btn-icon" onClick={onClose}><Icons.close/></button>
        </div>
        <div className="modal-body">

          {step === 'form' && (<>
            {/* Kart məlumatları */}
            {!promoInfo?.isFree && (
              <div style={{background:'var(--bg3)',borderRadius:12,padding:14,marginBottom:16}}>
                <div style={{fontSize:12,color:'var(--text3)',marginBottom:10,fontWeight:600,textTransform:'uppercase',letterSpacing:1}}>Ödəniş məlumatları</div>
                {[[`Kart`, SITE_CARD_NUMBER],[`Sahibi`, SITE_CARD_NAME]].map(([k,v],i)=>(
                  <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:i===0?8:0,paddingBottom:i===0?8:0,borderBottom:i===0?'1px solid var(--border)':'none'}}>
                    <span style={{color:'var(--text3)'}}>{k}</span>
                    <span style={{fontWeight:700,letterSpacing:i===0?1:0}}>{v}</span>
                  </div>
                ))}
              </div>
            )}

            {/* Məbləğ — promo amount varsa gizlə */}
            {!(promoInfo?.docData?.amount > 0) && !(promoInfo?.isFree) && (
            <div className="form-group">
              <label className="label">Məbləğ (₼)</label>
              <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
                {presets.map(p => (
                  <button key={p} onClick={() => setAmount(String(p))}
                    style={{padding:'5px 14px',border:`1px solid ${amount==p?'var(--neon1)':'var(--border)'}`,borderRadius:8,background: amount==p?'rgba(124,58,237,0.15)':'var(--bg3)',color: amount==p?'var(--neon1)':'var(--text2)',cursor:'pointer',fontSize:13,fontWeight:600}}>
                    {p} ₼
                  </button>
                ))}
              </div>
              <input className="input" type="number" min="1" placeholder="Məbləğ daxil edin" value={amount} onChange={e=>setAmount(e.target.value)}/>
            </div>
            )}

            {/* Promo kod */}
            <div className="form-group">
              <label className="label">Promo Kod (istəyə bağlı)</label>
              <div style={{display:'flex',gap:8}}>
                <input className="input" placeholder="PROMO123" value={promoCode} onChange={e=>setPromoCode(e.target.value.toUpperCase())} style={{flex:1}}/>
                <button className="btn btn-outline" onClick={checkPromo} style={{flexShrink:0,padding:'0 14px'}}>Tətbiq et</button>
              </div>
              {promoInfo && (
                <div style={{marginTop:8,padding:'10px 12px',background:'rgba(16,185,129,0.1)',border:'1px solid rgba(16,185,129,0.3)',borderRadius:8,fontSize:13,color:'var(--success)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  {promoInfo.docData?.amount > 0
                    ? <span>🎁 <b>{promoInfo.docData.amount} ₼</b> balansınıza əlavə olunacaq</span>
                    : promoInfo.isFree
                      ? <span>🎉 Tam pulsuz!</span>
                      : <span>✅ {promoInfo.discount}% endirim</span>
                  }
                  {promoInfo.docData?.amount === 0 && parseFloat(amount) > 0 && <span style={{fontWeight:700}}>{finalAmount} ₼ ödənilir</span>}
                </div>
              )}
            </div>

            {/* Çek yüklə */}
            {!promoInfo?.isFree && !(promoInfo?.docData?.amount > 0) && (
              <div className="form-group">
                <label className="label">Ödəniş çeki (şəkil)</label>
                <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleImg}/>
                {checkImg ? (
                  <div style={{position:'relative',borderRadius:10,overflow:'hidden',border:'1px solid var(--border)'}}>
                    <img src={checkImg} alt="çek" style={{width:'100%',maxHeight:200,objectFit:'contain',background:'#000'}}/>
                    <button onClick={()=>setCheckImg(null)} style={{position:'absolute',top:8,right:8,background:'var(--danger)',border:'none',borderRadius:'50%',width:24,height:24,color:'white',cursor:'pointer',fontSize:14}}>×</button>
                  </div>
                ) : (
                  <div onClick={()=>fileRef.current.click()} style={{border:'2px dashed var(--border2)',borderRadius:10,padding:'20px',textAlign:'center',cursor:'pointer',background:'var(--bg3)',fontSize:13,color:'var(--text3)'}}>
                    📷 Çek şəklini yükləyin
                  </div>
                )}
              </div>
            )}

            <button className="btn btn-primary w-full" style={{padding:'11px',fontSize:14}} onClick={async () => {
              if (promoInfo?.docData?.amount > 0) {
                const fixedAmt = promoInfo.docData.amount;
                const base = fixedAmt;
                if (!promoInfo?.isFree && !(promoInfo?.docData?.amount > 0) && !checkImg) { showToast('Ödəniş çekini yükləyin', 'error'); return; }
                setLoading(true);
                try {
                  const id = 'DEP' + Date.now().toString(36).toUpperCase();
                  setReqId(id);
                  await db.collection('depositRequests').doc(id).set({
                    uid: user.uid, email: user.email, displayName: user.displayName || '',
                    reqId: id, baseAmount: fixedAmt, finalAmount: fixedAmt,
                    promoCode: promoInfo.code, isFree: true, status: 'approved',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                  });
                  if (promoInfo.code) {
                    await db.collection('promoCodes').doc(promoInfo.code).update({
                      usedCount: firebase.firestore.FieldValue.increment(1)
                    });
                  }
                  await db.collection('users').doc(user.uid).set(
                    { balance: firebase.firestore.FieldValue.increment(fixedAmt) }, { merge: true }
                  );
                  await db.collection('transactions').add({
                    uid: user.uid, type: 'promo_topup', amount: fixedAmt,
                    description: `Promokod: ${promoInfo.code}`,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                  });
                  await tgNotify(`🎁 Promokod istifadəsi\n👤 ${user.displayName||user.email}\n🔑 Kod: ${promoInfo.code}\n💰 +${fixedAmt} ₼`);
                  showToast(`🎁 ${fixedAmt} ₼ balansınıza əlavə edildi!`, 'success');
                  setStep('done');
                } catch(e) { showToast('Xəta: ' + e.message, 'error'); }
                setLoading(false);
              } else {
                handleSubmit();
              }
            }} disabled={loading}>
              {loading ? <div className="spinner"/> : promoInfo?.docData?.amount > 0 ? `🎁 ${promoInfo.docData.amount} ₼ Al` : promoInfo?.isFree ? '🎉 Pulsuz Aktivləşdir' : '📤 Sorğu Göndər'}
            </button>
          </>)}

          {step === 'done' && (
            <div style={{textAlign:'center',padding:'20px 0'}}>
              {promoInfo?.isFree ? (
                <>
                  <div style={{fontSize:48,marginBottom:12}}>🎉</div>
                  <div style={{fontWeight:700,fontSize:16,marginBottom:8}}>Balans artırıldı!</div>
                  <div style={{fontSize:13,color:'var(--text3)',marginBottom:20}}>{parseFloat(amount)} ₼ hesabınıza əlavə edildi.</div>
                </>
              ) : (
                <>
                  <div style={{fontSize:48,marginBottom:12}}>✅</div>
                  <div style={{fontWeight:700,fontSize:16,marginBottom:8}}>Sorğu göndərildi!</div>
                  <div style={{fontSize:13,color:'var(--text3)',marginBottom:8,lineHeight:1.6}}>
                    Admin ödənişi yoxlayıb balansınızı artıracaq.<br/>Adətən 5-30 dəqiqə çəkir.
                  </div>
                  <div style={{background:'var(--bg3)',borderRadius:8,padding:'8px 12px',fontSize:12,color:'var(--text3)',marginBottom:20}}>
                    Sorğu ID: <span style={{fontWeight:700,color:'var(--text1)'}}>{reqId}</span>
                  </div>
                </>
              )}
              <button className="btn btn-primary w-full" onClick={onClose}>Bağla</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function VipModal({ user, onClose, showToast }) {

      if (doc.exists) setCredits(doc.data().vipCredits || 0);
    });
    return unsub;
  }, []);

  const handleBuyVip = async () => {
    setLoading(true);

      // Əməliyyat tarixçəsi

  const handlePaymentDone = handleBuyVip;

    const trimmed = code.trim().toUpperCase();

      const doc = await db.collection('vipRequests').doc(trimmed).get();

function LangSwitcher({ lang, setLang, t }) {
  const [open, setOpen] = React.useState(false);
  const options = [
    { code: 'az', flag: '🇦🇿', label: 'AZ' },
    { code: 'en', flag: '🇬🇧', label: 'EN' },
    { code: 'ru', flag: '🇷🇺', label: 'RU' },
  ];
  const current = options.find(o => o.code === lang);
  return (
    <div className="relative">
      <button className="lang-btn" onClick={() => setOpen(p => !p)} style={{fontSize:20,padding:'4px 6px',background:'none',border:'none',cursor:'pointer',lineHeight:1}}>
        {current?.flag}
      </button>
      {open && (
        <div className="lang-dropdown">
          {options.map(o => (
            <div
              key={o.code}
              className={`lang-option ${lang === o.code ? 'active' : ''}`}
              onClick={() => { setLang(o.code); setOpen(false); }}
              style={{display:'flex',alignItems:'center',gap:8}}
            >
              <span style={{fontSize:18}}>{o.flag}</span>
              <span style={{fontSize:13}}>{o.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [firebaseInit, setFirebaseInit] = React.useState(false);
  const [lang, setLang] = React.useState('az');
  const [page, setPage] = React.useState('home');
  const [user, setUser] = React.useState(null);
  const [authLoading, setAuthLoading] = React.useState(true);
  const [showAuth, setShowAuth] = React.useState(false);
  const [showProfileMenu, setShowProfileMenu] = React.useState(false);
  const [showVip, setShowVip] = React.useState(false);
  const [showDeposit, setShowDeposit] = React.useState(false);
  const [unreadCount, setUnreadCount] = React.useState(0);
  const [selectedListing, setSelectedListing] = React.useState(null);
  const [chatListing, setChatListing] = React.useState(null);
  const [favorites, setFavorites] = React.useState([]);
  const { toast, show: showToast } = useToast();

  const t = TRANSLATIONS[lang];

  // Auto-initialize Firebase with hardcoded config
  React.useEffect(() => {
    const ok = initFirebase(FIREBASE_CONFIG);
    if (ok) setFirebaseInit(true);
  }, []);

  // Auth listener
  React.useEffect(() => {
    if (!firebaseInit) { setAuthLoading(false); return; }
    const unsub = auth.onAuthStateChanged(u => {
      if (u) {
        const userData = {
          uid: u.uid,
          email: u.email || '',
          displayName: u.displayName || '',
          photoURL: u.photoURL || '',
          isGuest: false,
        };
        setUser(userData);
        // Online status — heartbeat ilə (hər 60 saniyə)
        if (db) {
          const ref = db.collection('users').doc(u.uid);
          const beat = () => ref.set({
            lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
            online: firebase.firestore.FieldValue.delete(),
          }, { merge: true });
          beat();
          const interval = setInterval(beat, 60000);
          window._onlineInterval = interval;
        }
      } else {
        setUser(null);
      }
      setAuthLoading(false);
    });
    return unsub;
  }, [firebaseInit]);

  // Load favorites
  React.useEffect(() => {
    if (!user || user.isGuest || !db) { setFavorites([]); return; }
    const q = db.collection('favorites').doc(user.uid).collection('items');
    const unsub = q.onSnapshot(snap => {
      setFavorites(snap.docs.map(d => d.id));
    });
    return unsub;
  }, [user]);

  // Oxunmamış mesaj sayı
  React.useEffect(() => {
    if (!user || user.isGuest || !db) { setUnreadCount(0); return; }
    let buyerUnread = 0, sellerUnread = 0;
    const unsubBuyer = db.collection('chats')
      .where('buyerId', '==', user.uid)
      .onSnapshot(snap => {
        buyerUnread = snap.docs.filter(d => (d.data().unreadBuyer || 0) > 0).length;
        setUnreadCount(buyerUnread + sellerUnread);
      }, () => {});
    const unsubSeller = db.collection('chats')
      .where('sellerId', '==', user.uid)
      .onSnapshot(snap => {
        sellerUnread = snap.docs.filter(d => (d.data().unreadSeller || 0) > 0).length;
        setUnreadCount(buyerUnread + sellerUnread);
      }, () => {});
    return () => { unsubBuyer(); unsubSeller(); };
  }, [user]);

  const toggleFav = async (listingId) => {
    if (!user || user.isGuest) { showToast(t.loginToFav, 'info'); return; }
    const ref = db.collection('favorites').doc(user.uid).collection('items').doc(listingId);
    if (favorites.includes(listingId)) {
      await ref.delete();
      showToast('Seçilmişlərdən silindi', 'info');
    } else {
      await ref.set({ savedAt: firebase.firestore.FieldValue.serverTimestamp() });
      showToast(t.saved, 'success');
    }
  };

  const handleLogout = async () => {
    await auth.signOut();
    setUser(null);
    setPage('home');
    showToast('Çıxış edildi', 'info');
  };

  const handleAuthClose = (asGuest) => {
    setShowAuth(false);
    if (asGuest) setUser({ isGuest: true, email: 'guest', uid: 'guest', displayName: 'Guest' });
  };

  const handleListingClick = (listing) => {
    setSelectedListing(listing);
  };

  const handleOpenChat = (listing) => {
    setChatListing(listing);
    setSelectedListing(null);
    setPage('chat');
  };

  if (!firebaseInit) {
    return <SetupScreen onDone={() => setFirebaseInit(true)} t={t}/>;
  }

  if (authLoading) {
    return (
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
        <div className="logo" style={{fontSize:36}}>Acc<span>Store</span></div>
        <div className="spinner spinner-lg"/>
      </div>
    );
  }

  if (!user) {
    return (
      <>
        <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,position:'relative',zIndex:1}}>
          <div className="logo" style={{fontSize:48,marginBottom:8}}>Acc<span>Store</span></div>
          <p style={{color:'var(--text2)',fontSize:15,marginBottom:40}}>{t.tagline}</p>

          <div style={{display:'flex',flexDirection:'column',gap:12,width:'100%',maxWidth:320}}>
            <button className="btn btn-primary" style={{padding:'14px 24px',fontSize:16}} onClick={() => setShowAuth(true)}>
              🔓 Daxil ol / Qeydiyyat
            </button>
            <button className="btn btn-outline" style={{padding:'14px 24px',fontSize:15}} onClick={() => { setUser({isGuest:true,email:'guest',uid:'guest',displayName:'Guest'}); }}>
              👀 {t.loginGuest}
            </button>
          </div>

          <div style={{position:'absolute',top:20,right:20}}>
            <LangSwitcher lang={lang} setLang={setLang} t={t}/>
          </div>
        </div>
        {showAuth && <AuthModal onClose={handleAuthClose} t={t}/>}
        <Toast toast={toast}/>
      </>
    );
  }

  // Listing detail
  if (selectedListing) {
    return (
      <>
        <div className="topbar">
          <div className="logo">Acc<span>Store</span></div>
          <LangSwitcher lang={lang} setLang={setLang} t={t}/>
        </div>
        <ListingDetailPage
          listing={selectedListing}
          onBack={() => setSelectedListing(null)}
          user={user}
          onFav={toggleFav}
          isFav={favorites.includes(selectedListing.id)}
          t={t}
          showToast={showToast}
          onOpenChat={handleOpenChat}
        />
        <Toast toast={toast}/>
      </>
    );
  }

  const navItems = [
    { id: 'home', icon: Icons.home, label: t.home },
    { id: 'chat', icon: Icons.chat, label: t.chat, badge: unreadCount },
    { id: 'create', icon: Icons.plus, label: t.create },
    { id: 'favorites', icon: () => <Icons.heart filled={false}/>, label: t.favorites },
    { id: 'profile', icon: Icons.profile, label: t.profile },
  ];

  return (
    <>
      {/* Topbar */}
      <div className="topbar">
        <div className="logo">Acc<span>Store</span></div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {user.isGuest && (
            <span style={{fontSize:11,color:'var(--warning)',background:'rgba(245,158,11,0.1)',border:'1px solid rgba(245,158,11,0.2)',padding:'3px 8px',borderRadius:50}}>
              👁 Guest
            </span>
          )}
          <LangSwitcher lang={lang} setLang={setLang} t={t}/>
          {!user.isGuest ? (
            <div style={{position:'relative'}}>
              <div
                style={{width:32,height:32,borderRadius:'50%',overflow:'hidden',border:'2px solid var(--neon1)',cursor:'pointer'}}
                onClick={() => setShowProfileMenu(p => !p)}
              >
                {user.photoURL
                  ? <img src={user.photoURL} alt="avatar" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                  : <div style={{width:'100%',height:'100%',background:'var(--grad1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'white'}}>
                      {(user.displayName||user.email||'U')[0].toUpperCase()}
                    </div>
                }
              </div>
              {showProfileMenu && (
                <>
                  <div style={{position:'fixed',inset:0,zIndex:199}} onClick={() => setShowProfileMenu(false)}/>
                  <div style={{
                    position:'absolute',top:40,right:0,zIndex:200,
                    background:'var(--bg2)',border:'1px solid var(--border)',
                    borderRadius:12,padding:8,minWidth:200,
                    boxShadow:'0 8px 32px rgba(0,0,0,0.4)'
                  }}>
                    {/* User info */}
                    <div style={{padding:'10px 12px 12px',borderBottom:'1px solid var(--border)',marginBottom:6}}>
                      <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{user.displayName || 'İstifadəçi'}</div>
                      <div style={{fontSize:12,color:'var(--text3)'}}>{user.email}</div>
                    </div>
                    {/* Profile */}
                    <button
                      style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 12px',background:'none',border:'none',borderRadius:8,cursor:'pointer',color:'var(--text1)',fontSize:13,textAlign:'left'}}
                      onMouseEnter={e => e.currentTarget.style.background='var(--bg3)'}
                      onMouseLeave={e => e.currentTarget.style.background='none'}
                      onClick={() => { setShowProfileMenu(false); setPage('profile'); }}
                    >
                      <span style={{fontSize:16}}>👤</span> {t.profile}
                    </button>
                    {/* My listings */}
                    <button
                      style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 12px',background:'none',border:'none',borderRadius:8,cursor:'pointer',color:'var(--text1)',fontSize:13,textAlign:'left'}}
                      onMouseEnter={e => e.currentTarget.style.background='var(--bg3)'}
                      onMouseLeave={e => e.currentTarget.style.background='none'}
                      onClick={() => { setShowProfileMenu(false); setPage('profile'); }}
                    >
                      <span style={{fontSize:16}}>📋</span> Elanlarım
                    </button>
                    {/* Wallet */}
                    <button
                      style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 12px',background:'none',border:'none',borderRadius:8,cursor:'pointer',color:'var(--text1)',fontSize:13,textAlign:'left'}}
                      onMouseEnter={e => e.currentTarget.style.background='var(--bg3)'}
                      onMouseLeave={e => e.currentTarget.style.background='none'}
                      onClick={() => { setShowProfileMenu(false); setShowDeposit(true); }}
                    >
                      <span style={{fontSize:16}}>💰</span> Cüzdan
                    </button>
                    {/* Balance + Deposit */}
                    <div style={{padding:'8px 12px',marginBottom:4}}>
                      <div style={{fontSize:11,color:'var(--text3)',marginBottom:2}}>Balansınız</div>
                      <BalanceDisplay uid={user.uid} style={{fontFamily:'Rajdhani',fontSize:18,fontWeight:700,color:'var(--neon1)'}}/>
                    </div>
                    <button
                      style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 12px',background:'none',border:'none',borderRadius:8,cursor:'pointer',color:'var(--neon1)',fontSize:13,textAlign:'left'}}
                      onMouseEnter={e => e.currentTarget.style.background='rgba(124,58,237,0.08)'}
                      onMouseLeave={e => e.currentTarget.style.background='none'}
                      onClick={() => { setShowProfileMenu(false); setShowDeposit(true); }}
                    >
                      <span style={{fontSize:16}}>💰</span> Balans Artır
                    </button>
                    {/* Logout */}
                    <div style={{borderTop:'1px solid var(--border)',marginTop:6,paddingTop:6}}>
                      <button
                        style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 12px',background:'none',border:'none',borderRadius:8,cursor:'pointer',color:'var(--danger)',fontSize:13,textAlign:'left'}}
                        onMouseEnter={e => e.currentTarget.style.background='rgba(239,68,68,0.08)'}
                        onMouseLeave={e => e.currentTarget.style.background='none'}
                        onClick={() => { setShowProfileMenu(false); handleLogout(); }}
                      >
                        <span style={{fontSize:16}}>🚪</span> {t.logout}
                      </button>
                    </div>
                  </div>
                </>
              )}
            </div>
          ) : (
            <button className="btn btn-primary btn-sm" onClick={() => setShowAuth(true)}>
              {t.login}
            </button>
          )}
        </div>
      </div>

      {/* Guest banner */}
      {user.isGuest && page === 'home' && (
        <div style={{
          position:'fixed', top:60, left:0, right:0, zIndex:99,
          background:'rgba(245,158,11,0.1)', borderBottom:'1px solid rgba(245,158,11,0.2)',
          padding:'8px 16px', fontSize:12, color:'var(--warning)', textAlign:'center'
        }}>
          {t.guestWarning}
        </div>
      )}

      {/* Pages */}
      {page === 'home' && (
        <HomePage t={t} user={user} onListingClick={handleListingClick} onFav={toggleFav} favorites={favorites}/>
      )}
      {page === 'chat' && (
        <ChatPage t={t} user={user} showToast={showToast} initialListing={chatListing}/>
      )}
      {page === 'create' && (
        <CreateListingPage t={t} user={user} showToast={showToast} onDone={() => setPage('home')}/>
      )}
      {page === 'favorites' && (
        <FavoritesPage t={t} user={user} favorites={favorites} onListingClick={handleListingClick} onFav={toggleFav}/>
      )}
      {page === 'profile' && (
        <ProfilePage t={t} user={user} onLogout={handleLogout} showToast={showToast} setShowDeposit={setShowDeposit}/>
      )}

      {/* Bottom Nav */}
      <nav className="nav">
        {navItems.map(item => (
          <button
            key={item.id}
            className={`nav-item ${page === item.id ? 'active' : ''} ${item.id === 'create' ? 'nav-create' : ''}`}
            onClick={() => {
              if (item.id === 'create' && (user.isGuest)) {
                setShowAuth(true);
              } else {
                setPage(item.id);
                if (item.id !== 'chat') setChatListing(null);
              }
            }}
          >
            <div style={{position:'relative',display:'inline-flex'}}>
              <item.icon/>
              {item.badge > 0 && <span style={{position:'absolute',top:-6,right:-8,background:'var(--danger)',color:'white',borderRadius:'50%',width:16,height:16,fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{item.badge > 9 ? '9+' : item.badge}</span>}
            </div>
            <span>{item.label}</span>
          </button>
        ))}
      </nav>

      {showAuth && <AuthModal onClose={handleAuthClose} t={t}/>}
      {showVip && <VipModal user={user} onClose={() => setShowVip(false)} showToast={showToast}/>}
      {showDeposit && <DepositModal user={user} onClose={() => setShowDeposit(false)} showToast={showToast}/>}
      <Toast toast={toast}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
