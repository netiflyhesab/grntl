<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AccStore – Game Account Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Firebase v9 compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <style>
    :root {
      --bg: #05050f;
      --bg2: #0a0a1a;
      --bg3: #0f0f22;
      --card: #0d0d20;
      --card2: #12122a;
      --border: #1e1e3f;
      --border2: #2a2a55;
      --neon1: #7c3aed;
      --neon2: #2563eb;
      --neon3: #ec4899;
      --neon4: #06b6d4;
      --text: #e8e8ff;
      --text2: #9090c0;
      --text3: #5555aa;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --grad1: linear-gradient(135deg, #7c3aed, #2563eb);
      --grad2: linear-gradient(135deg, #ec4899, #7c3aed);
      --grad3: linear-gradient(135deg, #06b6d4, #2563eb);
      --shadow: 0 0 30px rgba(124,58,237,0.15);
      --glow: 0 0 20px rgba(124,58,237,0.4);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Exo 2', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--neon1); border-radius: 2px; }


    /* VIP */
    .vip-section { margin-bottom: 20px; }
    .vip-section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #f59e0b;
    }
    .vip-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (min-width: 640px) { .vip-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 1024px) { .vip-grid { grid-template-columns: repeat(4, 1fr); } }
    .vip-card {
      background: linear-gradient(135deg, rgba(245,158,11,0.08), rgba(124,58,237,0.08));
      border: 1.5px solid rgba(245,158,11,0.4);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
    }
    .vip-card:hover {
      border-color: #f59e0b;
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(245,158,11,0.2);
    }
    .vip-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 50px;
      z-index: 2;
      letter-spacing: 0.5px;
    }
    .vip-toggle {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: linear-gradient(135deg, rgba(245,158,11,0.06), rgba(124,58,237,0.06));
      border: 1.5px solid rgba(245,158,11,0.25);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    .vip-toggle.active {
      border-color: #f59e0b;
      background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(124,58,237,0.12));
    }
    .vip-switch {
      width: 40px;
      height: 22px;
      border-radius: 50px;
      background: var(--border2);
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .vip-switch.on { background: linear-gradient(135deg, #f59e0b, #ef4444); }
    .vip-switch::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      transition: left 0.2s;
    }
    .vip-switch.on::after { left: 21px; }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    /* Utility */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }
    .w-full { width: 100%; }
    .relative { position: relative; }
    .absolute { position: absolute; }
    .hidden { display: none; }
    .cursor-pointer { cursor: pointer; }
    .text-center { text-align: center; }
    .mt-1 { margin-top: 4px; }
    .mt-2 { margin-top: 8px; }
    .mt-4 { margin-top: 16px; }
    .mb-4 { margin-bottom: 16px; }
    .p-4 { padding: 16px; }
    .rounded { border-radius: 8px; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(124,58,237,0.3); } 50% { box-shadow: 0 0 40px rgba(124,58,237,0.6); } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    .slide-in { animation: slideIn 0.3s ease forwards; }
    .spinning { animation: spin 1s linear infinite; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .floating { animation: float 3s ease-in-out infinite; }

    /* Skeleton loader */
    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card2);
      border: 1px solid var(--border2);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      z-index: 9999;
      animation: fadeIn 0.3s ease;
      box-shadow: var(--glow);
    }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--danger); color: var(--danger); }
    .toast.info { border-color: var(--neon1); color: var(--neon1); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--grad1);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: var(--glow); }
    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border2);
    }
    .btn-outline:hover { border-color: var(--neon1); color: var(--neon1); }
    .btn-danger {
      background: rgba(239,68,68,0.15);
      color: var(--danger);
      border: 1px solid rgba(239,68,68,0.3);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-ghost {
      background: transparent;
      color: var(--text2);
      padding: 8px;
      border-radius: 6px;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }
    .btn-icon { padding: 8px; border-radius: 6px; }

    /* Inputs */
    .input {
      width: 100%;
      padding: 11px 16px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .input:focus { border-color: var(--neon1); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
    .input::placeholder { color: var(--text3); }
    select.input option { background: var(--bg2); }
    textarea.input { resize: vertical; min-height: 100px; }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: all 0.25s ease;
    }
    .card:hover { border-color: var(--border2); box-shadow: var(--shadow); }
    .card-neon {
      background: var(--card);
      border: 1px solid var(--neon1);
      border-radius: 12px;
      box-shadow: var(--glow);
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-purple { background: rgba(124,58,237,0.2); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
    .badge-blue { background: rgba(37,99,235,0.2); color: #60a5fa; border: 1px solid rgba(37,99,235,0.3); }
    .badge-pink { background: rgba(236,72,153,0.2); color: #f472b6; border: 1px solid rgba(236,72,153,0.3); }
    .badge-cyan { background: rgba(6,182,212,0.2); color: #22d3ee; border: 1px solid rgba(6,182,212,0.3); }
    .badge-green { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
      animation: fadeIn 0.2s ease;
    }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 0 60px rgba(124,58,237,0.2);
      animation: fadeIn 0.3s ease;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .modal-body { padding: 24px; }

    /* Nav */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 65px;
      background: rgba(10,10,26,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 100;
      padding: 0 8px;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--text3);
      font-size: 11px;
      font-weight: 600;
      min-width: 60px;
      border: none;
      background: transparent;
      font-family: 'Exo 2', sans-serif;
    }
    .nav-item.active { color: var(--neon1); }
    .nav-item:hover { color: var(--text2); }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-item.active svg { filter: drop-shadow(0 0 6px var(--neon1)); }
    .nav-create {
      background: var(--grad1);
      color: white !important;
      border-radius: 14px;
      box-shadow: var(--glow);
    }
    .nav-create:hover { opacity: 0.9; transform: translateY(-2px); }

    /* Topbar */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(5,5,15,0.97);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }
    .logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px;
      font-weight: 700;
      background: var(--grad1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    .logo span { color: var(--neon3); -webkit-text-fill-color: var(--neon3); }

    /* Page */
    .page {
      padding-top: 74px;
      padding-bottom: 80px;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Listing Grid */
    .listings-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (min-width: 640px) {
      .listings-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    }
    @media (min-width: 1024px) {
      .listings-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
    }
    @media (min-width: 1280px) {
      .listings-grid { grid-template-columns: repeat(5, 1fr); gap: 20px; }
    }

    /* Listing Card */
    .listing-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s ease;
      animation: fadeIn 0.4s ease;
    }
    .listing-card:hover {
      border-color: var(--neon1);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .listing-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    .listing-body { padding: 12px; }
    .listing-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .listing-price {
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 700;
      background: var(--grad1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .listing-meta { font-size: 11px; color: var(--text3); margin-top: 4px; }

    /* Search bar */
    .search-bar {
      position: sticky;
      top: 64px;
      z-index: 90;
      background: rgba(5,5,15,0.95);
      backdrop-filter: blur(20px);
      padding: 12px 0;
      margin-bottom: 8px;
    }
    .search-bar-inner {
      position: relative;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .search-bar input {
      padding-left: 46px;
      height: 46px;
      font-size: 15px;
      border-radius: 12px;
      flex: 1;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      pointer-events: none;
    }

    /* Category chips */
    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 10px;
      margin-bottom: 16px;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text2);
      transition: all 0.2s;
    }
    .chip:hover { border-color: var(--border2); color: var(--text); }
    .chip.active {
      background: rgba(124,58,237,0.15);
      border-color: var(--neon1);
      color: #a78bfa;
      box-shadow: 0 0 12px rgba(124,58,237,0.2);
    }

    /* Label */
    .label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 6px;
      display: block;
    }
    .form-group { margin-bottom: 16px; }

    /* Detail page */
    .detail-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      background: var(--bg3);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .img-gallery {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 16px;
    }
    .img-gallery img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      flex-shrink: 0;
    }
    .img-gallery img.active { border-color: var(--neon1); }

    /* Chat */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
      animation: fadeIn 0.2s ease;
    }
    .msg.mine {
      background: rgba(124,58,237,0.3);
      border: 1px solid rgba(124,58,237,0.4);
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }
    .msg.theirs {
      background: var(--card2);
      border: 1px solid var(--border);
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }
    .msg-meta { font-size: 10px; color: var(--text3); margin-top: 4px; }
    .chat-input-bar {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    /* Image upload preview */
    .img-preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .img-preview-item {
      position: relative;
      width: 72px;
      height: 72px;
      border-radius: 10px;
      overflow: visible;
    }
    .img-preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .img-preview-remove {
      position: absolute;
      top: -5px;
      right: -5px;
      width: 18px;
      height: 18px;
      background: var(--danger);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 10px;
      line-height: 1;
      color: white;
      font-weight: 700;
      z-index: 1;
    }
    .upload-zone {
      border: 2px dashed var(--border2);
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text3);
      background: var(--bg3);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .upload-zone:hover { border-color: var(--neon1); color: var(--neon1); background: rgba(124,58,237,0.05); }

    /* Profile */
    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--grad1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: white;
      font-family: 'Rajdhani', sans-serif;
      border: 3px solid var(--neon1);
      box-shadow: var(--glow);
    }

    /* Lang switcher */
    .lang-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      color: var(--text2);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Exo 2', sans-serif;
      transition: all 0.2s;
    }
    .lang-btn:hover { border-color: var(--neon1); color: var(--neon1); }
    .lang-dropdown {
      position: absolute;
      top: 40px;
      right: 0;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;

async function tgSendPhoto(base64, caption) {
  if (!TELEGRAM_BOT_TOKEN || TELEGRAM_BOT_TOKEN === 'YOUR_BOT_TOKEN') return;
  try {
    // base64-ü blob-a çevir
    const arr = base64.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8arr = new Uint8Array(n);
    while(n--) u8arr[n] = bstr.charCodeAt(n);
    const blob = new Blob([u8arr], { type: mime });
    const fd = new FormData();
    fd.append('chat_id', TELEGRAM_CHAT_ID);
    fd.append('photo', blob, 'chek.jpg');
    fd.append('caption', caption);
    fd.append('parse_mode', 'HTML');
    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
      method: 'POST', body: fd
    });

}

function useToast() {
  const [toast, setToast] = React.useState(null);
  const show = React.useCallback((msg, type = 'info') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2800);
  }, []);
  return { toast, show };
}

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('az-AZ', { day:'2-digit', month:'short', year:'numeric' });
}
function formatTime(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('az-AZ', { hour:'2-digit', minute:'2-digit' });
}

function SetupScreen({ onDone, t }) {
  const [config, setConfig] = React.useState({
    apiKey: '', authDomain: '', projectId: '',
    storageBucket: '', messagingSenderId: '', appId: ''
  });
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  const handleSave = () => {
    if (!config.apiKey || !config.projectId) {
      setError('API Key and Project ID are required');
      return;
    }
    setLoading(true);
    setError('');
    localStorage.setItem('acstore_firebase_config', JSON.stringify(config));
    const ok = initFirebase(config);
    if (ok) {
      onDone();
    } else {
      setError('Firebase initialization failed. Check your config.');
      setLoading(false);
    }
  };

  const fields = [
    { k: 'apiKey', label: 'API Key' },
    { k: 'authDomain', label: 'Auth Domain' },
    { k: 'projectId', label: 'Project ID' },
    { k: 'storageBucket', label: 'Storage Bucket' },
    { k: 'messagingSenderId', label: 'Messaging Sender ID' },
    { k: 'appId', label: 'App ID' },
  ];

  return (
    <div className="setup-screen">
      <div className="logo">Acc<span>Store</span></div>
      <p style={{color:'var(--text2)', fontSize:14}}>Game Account Marketplace</p>

      <div className="setup-card">
        <h2 style={{fontFamily:'Rajdhani',fontSize:20,marginBottom:6}}>🔥 Firebase Setup</h2>
        <p style={{fontSize:13,color:'var(--text2)',marginBottom:20}}>
          Create a Firebase project at <a href="https://console.firebase.google.com" target="_blank" style={{color:'var(--neon4)'}}>console.firebase.google.com</a>, enable Authentication (Google), Firestore, and Storage. Then paste your config below.
        </p>

        <div className="glow-line" style={{marginBottom:20}}/>

        {fields.map(f => (
          <div key={f.k} className="form-group">
            <label className="label">{f.label}</label>
            <input
              className="input"
              value={config[f.k]}
              onChange={e => setConfig(p=>({...p,[f.k]:e.target.value}))}
              placeholder={f.label}
            />
          </div>
        ))}

        {error && <p style={{color:'var(--danger)',fontSize:13,marginBottom:12}}>{error}</p>}

        <button className="btn btn-primary w-full" onClick={handleSave} disabled={loading}>
          {loading ? <div className="spinner"/> : '🚀 Connect Firebase'}
        </button>

        <div style={{marginTop:24}}>
          <p style={{fontSize:12,color:'var(--text3)',marginBottom:12}}>Required Firestore Security Rules:</p>
          <pre style={{background:'var(--bg3)',padding:12,borderRadius:8,fontSize:11,color:'var(--neon4)',overflowX:'auto',lineHeight:1.6}}>
{`rules_version = '2';
service cloud.firestore {
  match /databases/{db}/documents {
    match /listings/{id} {
      allow read: if true;
      allow create: if request.auth != null;
      allow update, delete: if request.auth.uid == resource.data.userId;
    }
    match /chats/{chatId}/messages/{msgId} {
      allow read, write: if request.auth != null;
    }
    match /favorites/{uid}/items/{listingId} {
      allow read, write: if request.auth.uid == uid;
    }
    match /users/{uid} {
      allow read: if true;
      allow write: if request.auth.uid == uid;
    }
  }
}`}
          </pre>
        </div>
      </div>
    </div>
  );
}

// AUTH MODAL
// ============================================================
function AuthModal({ onClose, t }) {
  const [tab, setTab] = React.useState('login'); // 'login' | 'register'
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [displayName, setDisplayName] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const [showPass, setShowPass] = React.useState(false);

  const reset = () => { setEmail(''); setPassword(''); setDisplayName(''); setError(''); };

  const switchTab = (t) => { setTab(t); reset(); };

  const signIn = async () => {
    if (!email || !password) { setError(t.emailRequired || 'Email və şifrəni daxil edin'); return; }
    setLoading(true); setError('');
    try {
      await auth.signInWithEmailAndPassword(email, password);
      onClose();
    } catch(e) {
      const msgs = {
        'auth/user-not-found': t.noUser,
        'auth/wrong-password': t.wrongPass,
        'auth/invalid-email': t.invalidEmail,
        'auth/invalid-credential': t.invalidCred,
      };
      setError(msgs[e.code] || e.message);
    } finally { setLoading(false); }
  };

  const register = async () => {
    if (!displayName) { setError(t.nameRequired); return; }
    if (!email) { setError(t.emailRequired); return; }
    if (password.length < 6) { setError(t.passMin); return; }
    setLoading(true); setError('');
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, password);
      await cred.user.updateProfile({ displayName });
      onClose();
    } catch(e) {
      const msgs = {
        'auth/email-already-in-use': t.emailUsed,
        'auth/invalid-email': t.invalidEmail,
        'auth/weak-password': t.weakPass,
      };
      setError(msgs[e.code] || e.message);
    } finally { setLoading(false); }
  };

  const continueGuest = () => onClose(true);

  const tabStyle = (active) => ({
    flex: 1, padding: '10px', border: 'none', cursor: 'pointer',
    fontFamily: "'Exo 2', sans-serif", fontSize: 14, fontWeight: 700,
    background: active ? 'rgba(124,58,237,0.2)' : 'transparent',
    color: active ? '#a78bfa' : 'var(--text3)',
    borderBottom: active ? '2px solid var(--neon1)' : '2px solid transparent',
    transition: 'all 0.2s',
  });

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div style={{fontFamily:'Rajdhani',fontSize:20,fontWeight:700}}>🔐 AccStore</div>
          <button className="btn btn-ghost btn-icon" onClick={onClose}><Icons.close/></button>
        </div>

        {/* Tabs */}
        <div style={{display:'flex',borderBottom:'1px solid var(--border)'}}>
          <button style={tabStyle(tab==='login')} onClick={() => switchTab('login')}>{t.tabLogin}</button>
          <button style={tabStyle(tab==='register')} onClick={() => switchTab('register')}>{t.tabRegister}</button>
        </div>

        <div className="modal-body">
          {error && (
            <div style={{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:8,padding:'10px 14px',fontSize:13,color:'var(--danger)',marginBottom:14}}>
              {error}
            </div>
          )}

          {tab === 'register' && (
            <div className="form-group">
              <label className="label">{t.nameLabel}</label>
              <input className="input" placeholder="Adınızı daxil edin" value={displayName} onChange={e => setDisplayName(e.target.value)}/>
            </div>
          )}

          <div className="form-group">
            <label className="label">Email</label>
            <input className="input" type="email" placeholder="example@mail.com" value={email} onChange={e => setEmail(e.target.value)}/>
          </div>

          <div className="form-group">
            <label className="label">{t.passLabel}</label>
            <div style={{position:'relative'}}>
              <input
                className="input"
                type={showPass ? 'text' : 'password'}
                placeholder={tab==='register' ? (t.passMinPlaceholder||'Ən az 6 simvol') : (t.passPlaceholder||'Şifrənizi daxil edin')}
                value={password}
                onChange={e => setPassword(e.target.value)}
                onKeyDown={e => e.key==='Enter' && (tab==='login' ? signIn() : register())}
                style={{paddingRight:44}}
              />
              <button onClick={() => setShowPass(p=>!p)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:16}}>
                {showPass ? '🙈' : '👁'}
              </button>
            </div>
          </div>

          <button
            className="btn btn-primary w-full"
            style={{marginBottom:12, padding:'12px'}}
            onClick={tab==='login' ? signIn : register}
            disabled={loading}
          >
            {loading ? <div className="spinner"/> : (tab==='login' ? t.loginBtn : t.registerBtn)}
          </button>

          <div style={{display:'flex',alignItems:'center',gap:12,margin:'14px 0'}}>
            <div style={{flex:1,height:1,background:'var(--border)'}}/>
            <span style={{fontSize:12,color:'var(--text3)'}}>və ya</span>
            <div style={{flex:1,height:1,background:'var(--border)'}}/>
          </div>

          <button className="btn btn-outline w-full" onClick={continueGuest} style={{padding:'11px'}}>
            👀 {t.loginGuest}
          </button>

          <p style={{fontSize:11,color:'var(--text3)',marginTop:12,textAlign:'center',lineHeight:1.5}}>
            Qonaq kimi yalnız elanları görə bilərsiniz.
          </p>
        </div>
      </div>
    </div>
  );
}

  const [mainImg, setMainImg] = React.useState(0);
  const [showDelete, setShowDelete] = React.useState(false);
  const [deleting, setDeleting] = React.useState(false);
  const [editing, setEditing] = React.useState(false);
  const [lightbox, setLightbox] = React.useState(null);
  const [userRating, setUserRating] = React.useState(0);
  const [avgRating, setAvgRating] = React.useState(listing.avgRating || 0);
  const [ratingCount, setRatingCount] = React.useState(listing.ratingCount || 0);
  const [ratingDone, setRatingDone] = React.useState(false);

  const isOwner = user && !user.isGuest && user.uid === listing.userId;

  // İstifadəçinin əvvəlki reytinqini yüklə
  React.useEffect(() => {
    if (!user || user.isGuest || !db || !listing.id) return;
    db.collection('listings').doc(listing.id)
      .collection('ratings').doc(user.uid)
      .get().then(doc => {
        if (doc.exists) { setUserRating(doc.data().value); setRatingDone(true); }
      });
  }, [listing.id, user]);

  const submitRating = async (val) => {
    if (!user || user.isGuest || isOwner) return;
    setUserRating(val);
    setRatingDone(true);
    try {
      const ratingRef = db.collection('listings').doc(listing.id).collection('ratings').doc(user.uid);
      await ratingRef.set({ value: val, uid: user.uid, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      // Ortalama hesabla
      const snap = await db.collection('listings').doc(listing.id).collection('ratings').get();
      const vals = snap.docs.map(d => d.data().value);
      const avg = vals.reduce((a,b) => a+b, 0) / vals.length;
      const count = vals.length;
      await db.collection('listings').doc(listing.id).update({ avgRating: avg, ratingCount: count });
      setAvgRating(avg);
      setRatingCount(count);
      showToast('Reytinq verildi!', 'success');
    } catch(e) { console.error(e); }
  };

  const handleDelete = async () => {
    setDeleting(true);
    try {
      await db.collection('listings').doc(listing.id).delete();
      showToast(t.deleted, 'success');
      onBack();
    } catch(e) {
      showToast(t.error, 'error');
    }
    setDeleting(false);
  };

  if (editing) {
    return <EditListingPage listing={listing} onBack={() => setEditing(false)} t={t} showToast={showToast} user={user}/>;
  }

  return (
    <div className="page">
      <div className="container">
        <button className="btn btn-outline" style={{marginBottom:12,padding:'8px 20px',fontSize:14,display:'flex',alignItems:'center',gap:6,fontWeight:600}} onClick={onBack}>
          ← Geri
        </button>

        {/* Main Image */}
        <div className="detail-img" style={{cursor: listing.images && listing.images.length > 0 ? 'zoom-in' : 'default'}}
          onClick={() => listing.images && listing.images.length > 0 && setLightbox(mainImg)}>
          {listing.images && listing.images.length > 0
            ? <img src={listing.images[mainImg]} alt={listing.title} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:12}}/>
            : <span style={{fontSize:60}}>{CATEGORY_ICONS[listing.category] || '🎮'}</span>
          }
          {listing.images && listing.images.length > 0 && (
            <div style={{position:'absolute',bottom:8,right:8,background:'rgba(0,0,0,0.5)',borderRadius:6,padding:'4px 8px',fontSize:11,color:'white',backdropFilter:'blur(4px)'}}>
              🔍 Böyüt
            </div>
          )}
        </div>

        {/* Image Gallery */}
        {listing.images && listing.images.length > 1 && (
          <div className="img-gallery">
            {listing.images.map((img, i) => (
              <img
                key={i}
                src={img}
                alt={`img-${i}`}
                className={mainImg === i ? 'active' : ''}
                onClick={() => setMainImg(i)}
              />
            ))}
          </div>
        )}

        {/* Lightbox */}
        {lightbox !== null && listing.images && (
          <div
            style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.95)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}
            onClick={() => setLightbox(null)}
          >
            <img
              src={listing.images[lightbox]}
              alt="fullscreen"
              style={{maxWidth:'95vw',maxHeight:'85vh',objectFit:'contain',borderRadius:8}}
              onClick={e => e.stopPropagation()}
            />
            {/* Naviqasiya */}
            {listing.images.length > 1 && (
              <div style={{display:'flex',gap:16,marginTop:16}} onClick={e => e.stopPropagation()}>
                {listing.images.map((_, i) => (
                  <div
                    key={i}
                    onClick={() => setLightbox(i)}
                    style={{width:8,height:8,borderRadius:'50%',background: i===lightbox ? 'white' : 'rgba(255,255,255,0.3)',cursor:'pointer',transition:'background 0.2s'}}
                  />
                ))}
              </div>
            )}
            {listing.images.length > 1 && (
              <>
                <button
                  onClick={e => { e.stopPropagation(); setLightbox(i => (i - 1 + listing.images.length) % listing.images.length); }}
                  style={{position:'fixed',left:16,top:'50%',transform:'translateY(-50%)',background:'rgba(255,255,255,0.1)',border:'none',borderRadius:'50%',width:44,height:44,color:'white',fontSize:20,cursor:'pointer',backdropFilter:'blur(4px)'}}
                >‹</button>
                <button
                  onClick={e => { e.stopPropagation(); setLightbox(i => (i + 1) % listing.images.length); }}
                  style={{position:'fixed',right:16,top:'50%',transform:'translateY(-50%)',background:'rgba(255,255,255,0.1)',border:'none',borderRadius:'50%',width:44,height:44,color:'white',fontSize:20,cursor:'pointer',backdropFilter:'blur(4px)'}}
                >›</button>
              </>
            )}
            <button
              onClick={() => setLightbox(null)}
              style={{position:'fixed',top:16,right:16,background:'rgba(255,255,255,0.1)',border:'none',borderRadius:'50%',width:40,height:40,color:'white',fontSize:18,cursor:'pointer',backdropFilter:'blur(4px)'}}
            >✕</button>
          </div>
        )}

        {/* Title + Price + Actions — birləşdirilmiş blok */}
        <div className="card" style={{padding:16,marginBottom:12}}>

          {/* Başlıq + Kateqoriya + Sevilmişlər */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
            <div style={{flex:1,paddingRight:8}}>
              <h1 style={{fontFamily:'Rajdhani',fontSize:22,fontWeight:700,lineHeight:1.2,marginBottom:6}}>{listing.title}</h1>
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span className="badge badge-purple" style={{fontSize:11}}>
                  {CATEGORY_ICONS[listing.category]} {t.categories[listing.category]}
                </span>
                {avgRating > 0 && (
                  <span style={{fontSize:12,color:'#f59e0b',display:'flex',alignItems:'center',gap:3}}>
                    ★ <span style={{fontWeight:700}}>{avgRating.toFixed(1)}</span>
                    <span style={{color:'var(--text3)',fontSize:11}}>({ratingCount})</span>
                  </span>
                )}
              </div>
            </div>
            {user && !user.isGuest && (
              <button
                onClick={() => onFav(listing.id)}
                style={{background:'none',border:'none',cursor:'pointer',padding:4,color: isFav ? 'var(--neon3)' : 'var(--text3)',flexShrink:0}}
              >
                <svg viewBox="0 0 24 24" width="22" height="22" fill={isFav ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2">
                  <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
                </svg>
              </button>
            )}
          </div>

          {/* Qiymət */}
          <div style={{marginBottom:14,paddingBottom:14,borderBottom:'1px solid var(--border)'}}>
            <span style={{fontFamily:'Rajdhani',fontSize:30,fontWeight:700,background:'var(--grad1)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>
              {listing.price} ₼
            </span>
          </div>

          {/* Satıcı + Tarix */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:'var(--grad1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'white',flexShrink:0}}>
                {(listing.sellerName||listing.sellerEmail||'U')[0].toUpperCase()}
              </div>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{listing.sellerName || 'Anonymous'}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{formatDate(listing.createdAt)}</div>
              </div>
            </div>
            {listing.phone && (
              <a href={`tel:${listing.phone}`} style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:'var(--neon4)',textDecoration:'none',background:'rgba(6,182,212,0.08)',border:'1px solid rgba(6,182,212,0.2)',borderRadius:8,padding:'5px 10px'}}>
                <Icons.phone/> {listing.phone}
              </a>
            )}
          </div>

          {/* Action düymələri */}
          {isOwner ? (
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-outline" style={{flex:1,padding:'8px 12px',fontSize:13}} onClick={() => setEditing(true)}>
                <Icons.edit/> {t.edit}
              </button>
              <button className="btn btn-danger" style={{padding:'8px 14px',fontSize:13}} onClick={() => setShowDelete(true)}>
                <Icons.trash/> {t.delete}
              </button>
            </div>
          ) : user && !user.isGuest ? (
            <button className="btn btn-primary" style={{padding:'6px 14px',fontSize:12,borderRadius:8}} onClick={() => onOpenChat(listing)}>
              <Icons.chat/> {t.sendMsg}
            </button>
          ) : (
            <div style={{textAlign:'center',padding:'8px 0',fontSize:13,color:'var(--text3)'}}>
              🔒 {t.loginToChat}
            </div>
          )}
        </div>

        {/* Açıqlama */}
        {listing.description && (
          <div className="card" style={{padding:14,marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:600,color:'var(--text3)',marginBottom:6,textTransform:'uppercase',letterSpacing:1}}>Açıqlama</div>
            <p style={{fontSize:14,color:'var(--text2)',lineHeight:1.7}}>{listing.description}</p>
          </div>
        )}

        {/* Reytinq */}
        <div className="card" style={{padding:14,marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:1}}>Reytinq</div>
            {ratingCount > 0 && (
              <div style={{fontSize:12,color:'var(--text3)'}}>
                <span style={{color:'#f59e0b',fontWeight:700}}>{avgRating.toFixed(1)}</span> / 5 · {ratingCount} qiymət
              </div>
            )}
          </div>
          {!isOwner && user && !user.isGuest ? (
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <StarRating value={userRating} onChange={submitRating} readonly={ratingDone} size={24}/>
              {ratingDone && <span style={{fontSize:12,color:'var(--success)'}}>✓ Qiymətləndirildi</span>}
            </div>
          ) : isOwner ? (
            <div style={{fontSize:12,color:'var(--text3)'}}>Öz elanınıza qiymət verə bilməzsiniz</div>
          ) : (
            <div style={{fontSize:12,color:'var(--text3)'}}>Qiymət vermək üçün daxil olun</div>
          )}
        </div>
      </div>

      {/* Delete Confirm Modal */}
      {showDelete && (
        <div className="modal-overlay">
          <div className="modal" style={{maxWidth:360}}>
            <div className="modal-body" style={{textAlign:'center'}}>
              <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
              <p style={{fontSize:15,fontWeight:600,marginBottom:8}}>{t.confirmDelete}</p>
              <div style={{display:'flex',gap:10,marginTop:20}}>
                <button className="btn btn-outline w-full" onClick={() => setShowDelete(false)}>{t.no}</button>
                <button className="btn btn-danger w-full" onClick={handleDelete} disabled={deleting}>
                  {deleting ? <div className="spinner"/> : t.yes}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// EDIT LISTING PAGE
// ============================================================
function EditListingPage({ listing, onBack, t, showToast, user }) {
  const [form, setForm] = React.useState({
    title: listing.title || '',
    description: listing.description || '',
    price: listing.price || '',
    category: listing.category || 'other',
    phone: listing.phone || '',
  });
  const [saving, setSaving] = React.useState(false);

  const handleSave = async () => {
    if (!form.title || !form.price) return;
    setSaving(true);
    try {
      await db.collection('listings').doc(listing.id).update({
        title: form.title,
        description: form.description,
        price: Number(form.price),
        category: form.category,
        phone: form.phone,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      showToast(t.saved, 'success');
      onBack();
    } catch(e) {
      showToast(t.error, 'error');
    }
    setSaving(false);
  };

  return (
    <div className="page">
      <div className="container">
        <button className="btn btn-outline" style={{marginBottom:12,padding:'8px 20px',fontSize:14,display:'flex',alignItems:'center',gap:6,fontWeight:600}} onClick={onBack}>
          ← {t.cancel}
        </button>
        <h2 className="section-title">{t.editListing}</h2>

        <div className="form-group">
          <label className="label">{t.title}</label>
          <input className="input" value={form.title} onChange={e => setForm(p=>({...p,title:e.target.value}))}/>
        </div>
        <div className="form-group">
          <label className="label">{t.description}</label>
          <textarea className="input" value={form.description} onChange={e => setForm(p=>({...p,description:e.target.value}))}/>
        </div>
        <div style={{display:'flex',gap:12}}>
          <div className="form-group" style={{flex:1}}>
            <label className="label">{t.price}</label>
            <input className="input" type="number" value={form.price} onChange={e => setForm(p=>({...p,price:e.target.value}))}/>
          </div>
          <div className="form-group" style={{flex:1}}>
            <label className="label">{t.category}</label>
            <select className="input" value={form.category} onChange={e => setForm(p=>({...p,category:e.target.value}))}>
              {CATEGORIES.map(c => <option key={c} value={c}>{CATEGORY_ICONS[c]} {t.categories[c]}</option>)}
            </select>
          </div>
        </div>
        <div className="form-group">
          <label className="label">{t.phone}</label>
          <input className="input" value={form.phone} onChange={e => setForm(p=>({...p,phone:e.target.value}))}/>
        </div>
        <button className="btn btn-primary w-full" onClick={handleSave} disabled={saving}>
          {saving ? <div className="spinner"/> : <><Icons.check/> {t.save}</>}
        </button>
      </div>
    </div>
  );
}

// ============================================================
// CREATE LISTING PAGE
// ============================================================
function CreateListingPage({ t, user, showToast, onDone }) {
  const [form, setForm] = React.useState({
    title: '', description: '', price: '', category: 'other', phone: '', isVip: false
  });
  const [images, setImages] = React.useState([]);
  const [imageFiles, setImageFiles] = React.useState([]);
  const [uploading, setUploading] = React.useState(false);
  const [vipCredits, setVipCredits] = React.useState(0);
  const [showVipFromCreate, setShowVipFromCreate] = React.useState(false);

  React.useEffect(() => {
    if (!user || user.isGuest || !db) return;
    db.collection('users').doc(user.uid).get().then(doc => {
      if (doc.exists) setVipCredits(doc.data().balance || 0);
    });
  }, []);

  const handleImages = (e) => {
    const files = Array.from(e.target.files);
    if (files.length + imageFiles.length > 10) {
      showToast('Maksimum 10 şəkil', 'error');
      return;
    }
    const newPreviews = files.map(f => URL.createObjectURL(f));
    setImages(p => [...p, ...newPreviews]);
    setImageFiles(p => [...p, ...files]);
  };

  const removeImg = (i) => {
    setImages(p => p.filter((_,idx) => idx !== i));
    setImageFiles(p => p.filter((_,idx) => idx !== i));
  };

  const compressImage = (file) => new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 600;
        let w = img.width, h = img.height;
        if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
        else { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });

  const handleSubmit = async () => {
    if (!form.title || !form.price) {
      showToast('Başlıq və qiymət tələb olunur', 'error');
      return;
    }
    // VIP seçilibsə balansı yoxla
    if (form.isVip) {
      const userDoc = await db.collection('users').doc(user.uid).get();
      const bal = userDoc.exists ? (userDoc.data().balance || 0) : 0;
      if (bal < VIP_PRICE_AZN) {
        showToast(`VIP üçün balansınız kifayət deyil. Lazım: ${VIP_PRICE_AZN} ₼, Balans: ${bal.toFixed(2)} ₼`, 'error');
        setForm(p => ({...p, isVip: false}));
        return;
      }
    }
    setUploading(true);
    try {
      const base64Images = await Promise.all(imageFiles.map(compressImage));
      const docRef = db.collection('listings').doc();
      await docRef.set({
        title: form.title,
        description: form.description,
        price: Number(form.price),
        category: form.category,
        phone: form.phone,
        images: base64Images,
        userId: user.uid,
        sellerEmail: user.email,
        sellerName: user.displayName || (user.email || '').split('@')[0] || 'User',
        isVip: form.isVip || false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      // VIP seçilibsə balansdan çıx
      if (form.isVip) {
        await db.collection('users').doc(user.uid).set(
          { balance: firebase.firestore.FieldValue.increment(-VIP_PRICE_AZN) }, { merge: true }
        );
        await db.collection('transactions').add({
          uid: user.uid, type: 'vip', amount: -VIP_PRICE_AZN,
          description: 'VIP elan: ' + form.title,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      }
      showToast(t.saved, 'success');
      setForm({ title:'', description:'', price:'', category:'other', phone:'', isVip: false });
      setImages([]); setImageFiles([]);
      onDone();
    } catch(e) {
      showToast(t.error + ': ' + e.message, 'error');
    }
    setUploading(false);
  };

  if (!user || user.isGuest) {
    return (
      <div className="page">
        <div className="container">
          <div className="signin-prompt" style={{marginTop:60}}>
            <div style={{fontSize:40,marginBottom:12}}>🔒</div>
            <p style={{fontSize:15,fontWeight:600,marginBottom:4}}>{t.loginToPost}</p>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="page">
      <div className="container">
        <h2 className="section-title">{t.createListing}</h2>

        <div className="form-group">
          <label className="label">{t.title} *</label>
          <input className="input" value={form.title} onChange={e => setForm(p=>({...p,title:e.target.value}))} placeholder="e.g. League of Legends Diamond 2 Account"/>
        </div>

        <div className="form-group">
          <label className="label">{t.description}</label>
          <textarea className="input" value={form.description} onChange={e => setForm(p=>({...p,description:e.target.value}))} placeholder="Account details, champions, skins, rank..."/>
        </div>

        <div style={{display:'flex',gap:12}}>
          <div className="form-group" style={{flex:1}}>
            <label className="label">{t.price} *</label>
            <input className="input" type="number" value={form.price} onChange={e => setForm(p=>({...p,price:e.target.value}))} placeholder="0"/>
          </div>
          <div className="form-group" style={{flex:1}}>
            <label className="label">{t.category}</label>
            <select className="input" value={form.category} onChange={e => setForm(p=>({...p,category:e.target.value}))}>
              {CATEGORIES.map(c => <option key={c} value={c}>{CATEGORY_ICONS[c]} {t.categories[c]}</option>)}
            </select>
          </div>
        </div>

        <div className="form-group">
          <label className="label">{t.phone}</label>
          <input className="input" value={form.phone} onChange={e => setForm(p=>({...p,phone:e.target.value}))} placeholder="+994 XX XXX XX XX"/>
        </div>

        {/* VIP seçimi */}
        <div className="form-group">
          <div
            onClick={() => setForm(p => ({...p, isVip: !p.isVip}))}
            style={{
              display:'flex', alignItems:'center', gap:12, padding:'14px 16px',
              borderRadius:12, cursor:'pointer', transition:'all 0.2s',
              border: form.isVip ? '1.5px solid #f59e0b' : '1.5px solid var(--border)',
              background: form.isVip ? 'rgba(245,158,11,0.08)' : 'var(--bg3)',
            }}
          >
            <div style={{
              width:22, height:22, borderRadius:6, flexShrink:0,
              background: form.isVip ? '#f59e0b' : 'transparent',
              border: form.isVip ? '2px solid #f59e0b' : '2px solid var(--border2)',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:13, color:'white', fontWeight:700,
            }}>
              {form.isVip && '✓'}
            </div>
            <div>
              <div style={{fontWeight:700,fontSize:14,color: form.isVip ? '#f59e0b' : 'var(--text)'}}>⭐ VIP Elan</div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Elanınız ana səhifədə üstdə, xüsusi çərçivədə görünür</div>
            </div>
          </div>
        </div>

        {/* VIP Toggle */}
        <div
          className={`vip-toggle ${form.isVip ? 'active' : ''}`}
          onClick={() => {
            if (vipCredits >= VIP_PRICE_AZN) {
              setForm(p => ({...p, isVip: !p.isVip}));
            } else {
              showToast(`VIP üçün balans lazımdır: ${VIP_PRICE_AZN} ₼. Cüzdandan balans artırın.`, 'error');
              setForm(p => ({...p, isVip: false}));
            }
          }}
          style={{opacity: 1, cursor: vipCredits >= VIP_PRICE_AZN ? 'pointer' : 'not-allowed'}}
        >

// ============================================================
function SellerOnlineStatus({ uid, t }) {
  const [lastSeen, setLastSeen] = React.useState(null);
  React.useEffect(() => {
    if (!uid || !db) return;
    const unsub = db.collection('users').doc(uid).onSnapshot(doc => {
      if (doc.exists) {
        setLastSeen(doc.data().lastSeen);
      }
    });
    return unsub;
  }, [uid]);

  const [now, setNow] = React.useState(Date.now());
  React.useEffect(() => {
    const timer = setInterval(() => setNow(Date.now()), 30000);
    return () => clearInterval(timer);
  }, []);

  const getInfo = () => {
    if (!lastSeen) return { isOnline: false, label: t.offline || 'Oflayn' };
    const date = lastSeen.toDate ? lastSeen.toDate() : new Date(lastSeen);
    const diff = Math.floor((now - date.getTime()) / 60000);
    if (diff < 2) return { isOnline: true, label: t.online || 'Onlayn' };
    if (diff < 60) return { isOnline: false, label: `${diff} dəq öncə` };
    if (diff < 1440) return { isOnline: false, label: `${Math.floor(diff/60)} saat öncə` };
    return { isOnline: false, label: `${Math.floor(diff/1440)} gün öncə` };
  };

  const { isOnline, label } = getInfo();

  return (
    <div style={{display:'flex',alignItems:'center',gap:4,fontSize:11}}>
      <div style={{width:7,height:7,borderRadius:'50%',background: isOnline ? '#10b981' : '#6b7280', flexShrink:0}}/>
      <span style={{color: isOnline ? '#10b981' : 'var(--text3)'}}>
        {label}
      </span>
    </div>
  );
}

// ============================================================
// CHAT PAGE (rooms list + individual chat)
// ============================================================
function ChatPage({ t, user, showToast, initialListing }) {
  const [rooms, setRooms] = React.useState([]);
  const [buyerRooms, setBuyerRooms] = React.useState([]);
  const [sellerRooms, setSellerRooms] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [activeRoom, setActiveRoom] = React.useState(null);

  React.useEffect(() => {
    if (initialListing && user && !user.isGuest) {
      const sellerId = initialListing.userId || '';
      const buyerId = user.uid;
      // Unikal room ID: listingId + hər iki tərəfin uid-i
      const roomId = [initialListing.id, sellerId, buyerId].filter(Boolean).sort().join('_');
      const newRoom = {
        id: roomId,
        listing: initialListing,
        sellerId,
        buyerId,
        participants: [sellerId, buyerId].filter(Boolean),
      };
      setActiveRoom(newRoom);
      resetUnread(newRoom);
    }
  }, [initialListing]);

  React.useEffect(() => {
    if (!user || user.isGuest || !db) { setLoading(false); return; }

    // Həm alıcı həm satıcı kimi iştirak etdiyi chatları əldə et
    const unsubBuyer = db.collection('chats')
      .where('buyerId', '==', user.uid)
      .onSnapshot(snap => {
        setBuyerRooms(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      }, e => console.error('buyer chats:', e));

    const unsubSeller = db.collection('chats')
      .where('sellerId', '==', user.uid)
      .onSnapshot(snap => {
        setSellerRooms(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        setLoading(false);
      }, e => { console.error('seller chats:', e); setLoading(false); });

    return () => { unsubBuyer(); unsubSeller(); };
  }, [user]);

  // Hər iki siyahını birləşdir
  React.useEffect(() => {
    const map = new Map();
    [...buyerRooms, ...sellerRooms].forEach(r => map.set(r.id, r));
    const merged = Array.from(map.values());
    merged.sort((a,b) => (b.lastMessageAt?.toMillis?.() || 0) - (a.lastMessageAt?.toMillis?.() || 0));
    setRooms(merged);
  }, [buyerRooms, sellerRooms]);

  if (!user || user.isGuest) {
    return (
      <div className="page">
        <div className="container">
          <div className="signin-prompt" style={{marginTop:60}}>
            <div style={{fontSize:40,marginBottom:12}}>💬</div>
            <p style={{fontSize:15,fontWeight:600}}>{t.loginToChat}</p>
          </div>
        </div>
      </div>
    );
  }

  const resetUnread = async (room) => {
    if (!db || !user) return;
    const isUserBuyer = user.uid === room.buyerId;
    await db.collection('chats').doc(room.id).update({
      [isUserBuyer ? 'unreadBuyer' : 'unreadSeller']: 0,
    }).catch(() => {});
  };

  const openRoom = async (room) => {
    // Əgər listing məlumatı yoxdursa Firestore-dan yüklə
    if (!room.listing && room.listingId && db) {
      try {
        const doc = await db.collection('listings').doc(room.listingId).get();
        if (doc.exists) {
          room = { ...room, listing: { id: doc.id, ...doc.data() } };
        }
      } catch(e) { console.error(e); }
    }
    setActiveRoom(room);
    resetUnread(room);
  };

  if (activeRoom) {
    return <ChatRoom room={activeRoom} user={user} t={t} onBack={() => setActiveRoom(null)}/>;
  }

  return (
    <div className="page">
      <div className="container" style={{padding:'0 0 16px'}}>
        <div style={{padding:'0 16px 12px'}}>
          <h2 className="section-title" style={{marginBottom:0}}>{t.chat}</h2>
        </div>

        {loading ? (
          <div style={{display:'flex',justifyContent:'center',padding:40}}>
            <div className="spinner spinner-lg"/>
          </div>
        ) : rooms.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">💬</div>
            <div className="empty-title">{t.noChats}</div>
            <div className="empty-sub">{t.chatHint}</div>
          </div>
        ) : (
          rooms.map(room => {
            const isUserBuyer = user.uid === room.buyerId;
            const unread = isUserBuyer ? (room.unreadBuyer || 0) : (room.unreadSeller || 0);
            const isUnread = unread > 0;
            const senderName = room.lastSenderId === user.uid ? 'Siz' : (isUserBuyer ? room.sellerName : room.buyerName) || '';
            return (
            <div key={room.id} className="chat-room-item" onClick={() => openRoom(room)}
              style={{background: isUnread ? 'rgba(124,58,237,0.06)' : 'transparent', borderLeft: isUnread ? '3px solid var(--neon1)' : '3px solid transparent'}}>
              <div style={{position:'relative',flexShrink:0}}>
                <div style={{width:44,height:44,borderRadius:10,background:'var(--grad1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>
                  {CATEGORY_ICONS[room.listingCategory] || '🎮'}
                </div>
                {isUnread && (
                  <div style={{position:'absolute',top:-4,right:-4,background:'var(--danger)',color:'white',borderRadius:'50%',minWidth:18,height:18,fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 3px'}}>
                    {unread > 9 ? '9+' : unread}
                  </div>
                )}
              </div>
              <div style={{flex:1,overflow:'hidden'}}>
                <div style={{fontWeight: isUnread ? 700 : 600, fontSize:14, marginBottom:2}} className="truncate">
                  {room.listingTitle || 'Chat'}
                </div>
                <div style={{fontSize:12, color: isUnread ? 'var(--text2)' : 'var(--text3)', fontWeight: isUnread ? 600 : 400}} className="truncate">
                  {senderName ? <span style={{color: room.lastSenderId === user.uid ? 'var(--text3)' : 'var(--neon1)'}}>{senderName}: </span> : null}
                  {room.lastMessage || '...'}
                </div>
              </div>
              <div style={{fontSize:11,color: isUnread ? 'var(--neon1)' : 'var(--text3)',textAlign:'right',flexShrink:0,fontWeight: isUnread ? 700 : 400}}>
                {room.lastMessageAt ? formatTime(room.lastMessageAt) : ''}
              </div>
            </div>
            );
          })
        )}
      </div>
    </div>
  );
}

// ============================================================
// CHAT ROOM
// ============================================================
function ChatRoom({ room, user, t, onBack }) {
  const [messages, setMessages] = React.useState([]);
  const [text, setText] = React.useState('');
  const [sending, setSending] = React.useState(false);
  const messagesEndRef = React.useRef(null);

  React.useEffect(() => {
    if (!db || !room.id) return;
    const q = db.collection('chats').doc(room.id).collection('messages').orderBy('createdAt', 'asc');
    const unsub = q.onSnapshot(snap => {
      setMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
    });
    return unsub;
  }, [room.id]);

  const sendMessage = async () => {
    if (!text.trim() || sending) return;
    setSending(true);
    const msg = text.trim();
    setText('');
    try {
      const batch = db.batch();
      const msgRef = db.collection('chats').doc(room.id).collection('messages').doc();
      batch.set(msgRef, {
        text: msg,
        senderId: user.uid,
        senderEmail: user.email,
        senderName: user.displayName || (user.email || '').split('@')[0] || 'User',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      const chatRef = db.collection('chats').doc(room.id);
      const listing = room.listing || {};
      // sellerId və buyerId room-dan gəlir, dəyişdirilmir
      const sellerId = room.sellerId || listing.userId || '';
      const buyerId = room.buyerId || (user.uid !== sellerId ? user.uid : '');
      const isUserBuyer = user.uid === buyerId;
      batch.set(chatRef, {
        sellerId: sellerId,
        buyerId: buyerId,
        sellerName: !isUserBuyer ? (user.displayName || user.email || '') : (room.sellerName || ''),
        buyerName: isUserBuyer ? (user.displayName || user.email || '') : (room.buyerName || ''),
        participants: [sellerId, buyerId].filter(Boolean),
        listingId: room.listingId || listing.id || '',
        listingTitle: room.listingTitle || listing.title || '',
        listingCategory: room.listingCategory || listing.category || '',
        lastMessage: msg,
        lastSenderId: user.uid,
        lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
        [isUserBuyer ? 'unreadSeller' : 'unreadBuyer']: firebase.firestore.FieldValue.increment(1),
      }, { merge: true });
      await batch.commit();
    } catch(e) {
      console.error(e);
    }
    setSending(false);
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  };

  return (
    <div className="page" style={{display:'flex',flexDirection:'column',height:'100vh',paddingBottom:0}}>
      {/* Header */}
      <div style={{padding:'8px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>
        <button className="btn btn-ghost btn-icon" onClick={onBack}><Icons.back/></button>
        <div>
          <div style={{fontWeight:700,fontSize:14}}>{room.listingTitle || room.listing?.title || 'Chat'}</div>
          <div style={{fontSize:11,color:'var(--success)',display:'flex',alignItems:'center',gap:4}}>
            <div className="notif-dot" style={{background:'var(--success)'}}/>
            {t.online}
          </div>
        </div>
      </div>

      {/* Messages */}
      <div className="chat-messages" style={{flex:1,paddingBottom:80}}>
        {messages.length === 0 && (
          <div style={{textAlign:'center',color:'var(--text3)',fontSize:13,marginTop:40}}>
            👋 Söhbəti başladın!
          </div>
        )}
        {messages.map(msg => (
          <div key={msg.id} className={`msg ${msg.senderId === user.uid ? 'mine' : 'theirs'}`}>
            <div>{msg.text}</div>
            <div className="msg-meta">
              {msg.senderId !== user.uid && <span>{msg.senderName} · </span>}
              {formatTime(msg.createdAt)}
            </div>
          </div>
        ))}
        <div ref={messagesEndRef}/>
      </div>

      {/* Input */}
      <div className="chat-input-bar" style={{position:'fixed',bottom:65,left:0,right:0,background:'rgba(10,10,26,0.98)',backdropFilter:'blur(20px)'}}>
        <input
          className="input"
          value={text}
          onChange={e => setText(e.target.value)}
          onKeyDown={handleKeyDown}
          placeholder={t.typeMsg}
          style={{flex:1}}
        />
        <button className="btn btn-primary btn-icon" onClick={sendMessage} disabled={sending || !text.trim()} style={{width:38,height:38,padding:0,flexShrink:0}}>
          {sending ? <div className="spinner"/> : <Icons.send/>}
        </button>
      </div>
    </div>
  );
}

// ============================================================
// FAVORITES PAGE
// ============================================================
function FavoritesPage({ t, user, favorites, onListingClick, onFav }) {
  const [listings, setListings] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    if (!user || user.isGuest || !db || favorites.length === 0) {
      setLoading(false);
      setListings([]);
      return;
    }
    setLoading(true);
    const fetch = async () => {
      try {
        const chunks = [];
        for (let i = 0; i < favorites.length; i += 10) {
          chunks.push(favorites.slice(i, i + 10));
        }
        const results = [];
        for (const chunk of chunks) {
          const snap = await db.collection('listings').where(firebase.firestore.FieldPath.documentId(), 'in', chunk).get();
          snap.docs.forEach(d => results.push({ id: d.id, ...d.data() }));
        }
        setListings(results);
      } catch(e) { console.error(e); }
      setLoading(false);
    };
    fetch();
  }, [favorites, user]);

  if (!user || user.isGuest) {
    return (
      <div className="page">
        <div className="container">
          <div className="signin-prompt" style={{marginTop:60}}>
            <div style={{fontSize:40,marginBottom:12}}>❤️</div>
            <p style={{fontSize:15,fontWeight:600}}>{t.loginToFav}</p>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="page">
      <div className="container">
        <h2 className="section-title">{t.favorites}</h2>

        {loading ? (
          <div className="listings-grid">
            {Array(4).fill(0).map((_,i) => <SkeletonCard key={i}/>)}
          </div>
        ) : listings.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">❤️</div>
            <div className="empty-title">{t.noFavorites}</div>
            <div className="empty-sub">Bəyəndiyiniz elanları saxlayın</div>
          </div>
        ) : (
          <div className="listings-grid">
            {listings.map(l => (
              <ListingCard
                key={l.id}
                listing={l}
                onClick={onListingClick}
                onFav={onFav}
                isFav={true}
                t={t}
              />
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function ProfilePage({ t, user, onLogout, showToast, setShowDeposit }) {

  const [deleting, setDeleting] = React.useState(null);
  const [favCount, setFavCount] = React.useState(0);
  const [avgRating, setAvgRating] = React.useState(0);

  React.useEffect(() => {
    if (!user || user.isGuest || !db) { setLoading(false); return; }
    const q = db.collection('listings').where('userId', '==', user.uid);
    const unsub = q.onSnapshot(snap => {
      const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      data.sort((a,b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
      setListings(data);
      setLoading(false);
      // Ortalama reytinqi hesabla

        {loading ? (
          <div style={{display:'flex',justifyContent:'center',padding:32}}>
            <div className="spinner spinner-lg"/>
          </div>
        ) : listings.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">📭</div>
            <div className="empty-title">{t.noListings}</div>
          </div>
        ) : (
          listings.map(l => (
            <div key={l.id} className="card" style={{padding:14,marginBottom:10,display:'flex',gap:12,alignItems:'center'}}>
              <div style={{width:50,height:50,borderRadius:8,background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0,overflow:'hidden'}}>
                {l.images && l.images[0]
                  ? <img src={l.images[0]} alt={l.title} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                  : CATEGORY_ICONS[l.category] || '🎮'
                }
              </div>
              <div style={{flex:1,overflow:'hidden'}}>
                <div style={{fontWeight:600,fontSize:14}} className="truncate">{l.title}</div>
                <div style={{fontSize:12,color:'var(--neon1)',fontFamily:'Rajdhani',fontWeight:700}}>{l.price} ₼</div>
              </div>
              <button
                className="btn btn-danger btn-sm"
                onClick={() => handleDelete(l.id)}
                disabled={deleting === l.id}
              >
                {deleting === l.id ? <div className="spinner" style={{width:14,height:14}}/> : <Icons.trash/>}
              </button>
            </div>
          ))
        )}

        <div className="divider"/>
        <button className="btn btn-outline w-full" onClick={onLogout} style={{color:'var(--danger)',borderColor:'rgba(239,68,68,0.3)'}}>
          {t.logout}
        </button>
      </div>
    </div>
  );
}

function StarRating({ value, onChange, size = 22, readonly = false }) {
  const [hover, setHover] = React.useState(0);
  return (
    <div style={{display:'flex',gap:2}}>
      {[1,2,3,4,5].map(star => (
        <span
          key={star}
          style={{fontSize:size,cursor:readonly?'default':'pointer',color:(hover||value)>=star?'#f59e0b':'var(--text3)',transition:'color 0.15s',lineHeight:1}}
          onClick={() => !readonly && onChange && onChange(star)}
          onMouseEnter={() => !readonly && setHover(star)}
          onMouseLeave={() => !readonly && setHover(0)}
        >★</span>
      ))}
    </div>
  );
}

function BalanceDisplay({ uid, style }) {
  const [balance, setBalance] = React.useState(0);
  React.useEffect(() => {
    if (!uid || !db) return;
    const unsub = db.collection('users').doc(uid).onSnapshot(doc => {
      if (doc.exists) setBalance(doc.data().balance || 0);
    });
    return unsub;
  }, [uid]);
  return <span style={style}>{balance.toFixed(2)} ₼</span>;
}
